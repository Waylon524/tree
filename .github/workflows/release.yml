name: release

# Build the Windows desktop installers and attach them to a GitHub Release.
# macOS is packaged, notarized, and uploaded from a local Mac release machine.
# Triggered by a version tag; workflow_dispatch builds without releasing (to
# validate the pipeline).
on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      target:
        description: "Installer target to build"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - windows

permissions:
  contents: write

jobs:
  preflight:
    name: Release preflight
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Verify tag is tested source and versions agree
        shell: bash
        run: |
          if [[ "$GITHUB_REF_TYPE" == "tag" ]]; then
            git fetch origin main
            git merge-base --is-ancestor "$GITHUB_SHA" origin/main
            python packaging/release_doctor.py --tag "$GITHUB_REF_NAME"
          else
            python packaging/release_doctor.py
          fi
      - name: Install Python dependencies
        run: python -m pip install -c packaging/release-constraints.txt -e ".[rag,gui,dev]"
      - name: Python quality and tests
        run: |
          python -m ruff check tree_engine tests
          python packaging/check_mypy_baseline.py
          python -m pytest -q
      - name: Frontend quality and tests
        working-directory: desktop
        run: |
          npm ci
          npm test
          npm run build
      - name: Rust quality and tests
        working-directory: desktop/src-tauri
        run: |
          cargo fmt --check
          cargo test --locked

  select-targets:
    name: Select release targets
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - id: matrix
        env:
          TARGET: ${{ github.event_name == 'workflow_dispatch' && inputs.target || 'all' }}
        run: |
          case "$TARGET" in
            all)
              matrix='{"include":[{"os":"windows-latest","label":"Windows","target":"windows","artifact":"windows"}]}'
              ;;
            windows)
              matrix='{"include":[{"os":"windows-latest","label":"Windows","target":"windows","artifact":"windows"}]}'
              ;;
            *)
              echo "Unsupported target: $TARGET" >&2
              exit 1
              ;;
          esac
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"

  desktop:
    name: ${{ matrix.label }}
    needs: [preflight, select-targets]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.select-targets.outputs.matrix) }}
    steps:
      - name: Skip non-selected target
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.target != 'all' && inputs.target != matrix.target }}
        run: echo "Skipping ${{ matrix.label }} because target=${{ inputs.target }}."

      - uses: actions/checkout@v4
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.target == 'all' || inputs.target == matrix.target }}

      - uses: actions/setup-python@v5
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.target == 'all' || inputs.target == matrix.target }}
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.target == 'all' || inputs.target == matrix.target }}
        with:
          node-version: "24"

      - uses: dtolnay/rust-toolchain@stable
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.target == 'all' || inputs.target == matrix.target }}

      # Build the standalone engine on each OS (no cross-compile). Output lands in
      # packaging/dist/tre-engine, which tauri.conf.json bundles as a resource.
      - name: Build engine sidecar (PyInstaller)
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.target == 'all' || inputs.target == matrix.target }}
        run: |
          python -m pip install -c packaging/release-constraints.txt -e ".[rag,gui]" pyinstaller==6.21.0
          python -m PyInstaller --noconfirm --clean --distpath packaging/dist --workpath packaging/build packaging/tre-engine.spec

      - name: Install frontend deps
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.target == 'all' || inputs.target == matrix.target }}
        working-directory: desktop
        run: npm ci

      - uses: tauri-apps/tauri-action@v0
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.target == 'all' || inputs.target == matrix.target }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: desktop
          # On a tag: create a draft release with the installers. On manual
          # dispatch: build only (empty tagName) to validate the pipeline.
          tagName: ${{ github.ref_type == 'tag' && github.ref_name || '' }}
          releaseName: "TREE ${{ github.ref_name }}"
          releaseDraft: true
          releaseBody: "Desktop installers. Windows is unsigned — SmartScreen: More info → Run anyway."

      - name: Generate Windows checksums and dependency evidence
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.target == 'all' || inputs.target == matrix.target }}
        shell: pwsh
        run: |
          $files = Get-ChildItem desktop/src-tauri/target/release/bundle -Recurse -File |
            Where-Object { $_.Extension -in '.exe', '.msi' }
          if ($files.Count -eq 0) { throw 'No Windows installers found' }
          $lines = $files | ForEach-Object {
            $hash = (Get-FileHash $_.FullName -Algorithm SHA256).Hash.ToLower()
            "$hash  $($_.Name)"
          }
          $lines | Set-Content packaging/SHA256SUMS-windows.txt
          python -m pip list --format=json | Set-Content packaging/python-packages-windows.json

      - name: Upload release evidence
        if: ${{ github.ref_type == 'tag' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ github.ref_name }}" packaging/SHA256SUMS-windows.txt packaging/python-packages-windows.json --clobber

      - name: Upload workflow-dispatch artifacts
        if: ${{ github.event_name == 'workflow_dispatch' && (inputs.target == 'all' || inputs.target == matrix.target) }}
        uses: actions/upload-artifact@v4
        with:
          name: tree-${{ matrix.artifact }}-installer
          path: |
            desktop/src-tauri/target/release/bundle/**/*.dmg
            desktop/src-tauri/target/release/bundle/**/*.msi
            desktop/src-tauri/target/release/bundle/**/*.exe
            desktop/src-tauri/target/release/bundle/**/*.AppImage
            desktop/src-tauri/target/release/bundle/**/*.deb
            desktop/src-tauri/target/release/bundle/**/*.rpm
            packaging/SHA256SUMS-windows.txt
            packaging/python-packages-windows.json
          if-no-files-found: error
