name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    name: python (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      # No [local-embed]: the test suite mocks the embedding server, so we skip
      # llama-cpp-python (its native build is the unreliable bit on Windows).
      - name: Install
        run: python -m pip install -e ".[rag,gui,dev]"
      - name: Ruff
        run: python -m ruff check tree_engine tests
      - name: Pytest
        run: python -m pytest -q

  frontend:
    name: frontend build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install
        working-directory: desktop
        run: npm ci
      - name: Build
        working-directory: desktop
        run: npm run build
